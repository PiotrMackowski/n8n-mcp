name: Dependency Audit

# Checks for known vulnerabilities in production dependencies
# and verifies critical dependency version compatibility.

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/dependency-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/dependency-check.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC

permissions:
  contents: read

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Verify critical dependency versions
        run: |
          echo "=== Critical Dependency Version Check ==="

          SDK_VERSION=$(node -e "console.log(require('@modelcontextprotocol/sdk/package.json').version)")
          ZOD_VERSION=$(node -e "console.log(require('zod/package.json').version)")

          echo "MCP SDK version: $SDK_VERSION"
          echo "Zod version: $ZOD_VERSION"

          # MCP SDK must be pinned version
          EXPECTED_SDK=$(node -e "console.log(require('./package.json').dependencies['@modelcontextprotocol/sdk'])")
          if [ "$SDK_VERSION" != "$EXPECTED_SDK" ]; then
            echo "FAILED: MCP SDK version mismatch (expected $EXPECTED_SDK, got $SDK_VERSION)"
            exit 1
          fi
          echo "MCP SDK version OK: $SDK_VERSION"

          # Zod must be 3.x (not 4.x which breaks MCP SDK)
          if [[ "$ZOD_VERSION" =~ ^4\. ]]; then
            echo "FAILED: Zod v4 detected - incompatible with MCP SDK"
            exit 1
          fi
          echo "Zod version OK: $ZOD_VERSION"

          echo ""
          echo "=== All checks passed ==="
